<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CYPHER SPHERE - Integrated Cryptosystem</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
        
        <link rel="stylesheet" href="style.css">
        
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            'bg-dark': 'var(--bg-dark)',
                            'primary-neon': 'var(--primary-neon)',
                            'secondary-neon': 'var(--secondary-neon)',
                            'text-light': 'var(--text-light)',
                        },
                        boxShadow: {
                            'neon-glow': '0 0 15px rgba(147, 51, 234, 0.6), 0 0 30px rgba(147, 51, 234, 0.3)',
                        }
                    }
                }
            }
        </script>
    </head>
    <body class="min-h-screen relative">
        <canvas id="matrix-canvas" class="fixed top-0 left-0 w-full h-full z-0"></canvas>
        
        <nav
            class="sticky top-0 z-50 bg-bg-dark/90 backdrop-blur-sm shadow-xl border-b border-primary-neon/50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <a href="#"
                        class="flex-shrink-0 text-xl font-extrabold text-white tracking-widest flex items-center">
                        <svg class="w-6 h-6 mr-2 text-secondary-neon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                        CYPHER SPHERE
                    </a>
                    <div class="flex space-x-4">
                        <button id="reset-app-btn"
                            class="px-4 py-2 text-sm font-medium text-white bg-primary-neon rounded-lg shadow-neon-glow hover:bg-primary-neon/80 transition-all focus:outline-none focus:ring-2 focus:ring-primary-neon">
                            Reset System
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <main id="app-container"
            class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 relative z-10">
            </main>

        <div id="temp-message" class="opacity-0 fixed"></div>

        <script src="Script.js"></script>
    </body>
</html>
